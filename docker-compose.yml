
# ==========================================
# BASE CONFIGURATION
# Defines Services, Images, Networks
# ==========================================

services:
  # 1. Main NGINX Gateway
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: scrumflow-nginx
    container_name: scrumflow-nginx
    depends_on:
      - frontend
      - backend
      - ai-system
    networks:
      - scrumflow-network

  # 2. PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: scrumflow-db
    networks:
      - scrumflow-network
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 3. Laravel Backend (PHP-FPM)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: scrumflow-backend
    container_name: scrumflow-backend
    depends_on:
      - db
    networks:
      - scrumflow-network

  # 4. React/Vue Frontend (Serves Static JS via its own lightweight Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: scrumflow-frontend
    container_name: scrumflow-frontend
    networks:
      - scrumflow-network

  # 5. AI System
  ai-system:
    build:
      context: "./Ai System"
      dockerfile: Dockerfile
    image: scrumflow-ai
    container_name: scrumflow-ai
    networks:
      - scrumflow-network

networks:
  scrumflow-network:
    driver: bridge

volumes:
  postgres_data: