server {
    listen 80;
    server_name 158.158.112.55;

    # --- PARTIE 1 : REACT (Frontend) ---
    # Les fichiers compilés par ton Dockerfile frontend arrivent ici
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- PARTIE 2 : LARAVEL (Backend API) ---
    location /api {
        # On redirige vers l'index.php de Laravel situé dans le conteneur backend
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Traitement des fichiers PHP par le service 'backend'
    location ~ \.php$ {
        # Le code Laravel est dans /var/www dans le conteneur backend
        root /var/www/public; 
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # --- PARTIE 3 : MODÈLE IA (Python) ---
    # Redirection des requêtes vers ton API Gemini
    location /ai {
        # 'ai-system' est le nom du service dans ton docker-compose.yml
        proxy_pass http://ai-system:8001; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optimisation pour ne pas saturer les logs Azure
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.html;
}