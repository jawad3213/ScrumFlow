server {
    listen 80;
    server_name 158.158.112.55;

    # --- PARTIE 1 : REACT (Frontend) ---
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # IMPORTANT : Cette ligne permet à React Router de gérer l'affichage 
        # de la Landing Page au lieu que Nginx ne cherche un dossier physique.
        try_files $uri $uri/ /index.html;
    }

    # Gestion des Assets (Images, Logos)
    # Ton logo 'genralLogo.png' doit être accessible ici
    location /assets/ {
        expires 1M;
        access_log off;
        add_header Cache-Control "public";
    }

    # --- PARTIE 2 : LARAVEL (Backend API) ---
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        root /var/www/public; 
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # --- PARTIE 3 : MODÈLE IA (Python) ---
    location /ai/ {
        proxy_pass http://ai-system:8001/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # AI analysis can take several minutes (Gemini API + PDF processing)
        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
        send_timeout          300s;

        # Allow large PDF uploads (up to 50MB)
        client_max_body_size 50M;
    }

    # Optimisation pour ne pas saturer les logs Azure
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.html;
}