version: '3.8'

services:
  # 1. Base de données PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: growtrack-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE:-growtrack_db}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-your_db_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - growtrack-network

  # 2. Backend Laravel (PHP-FPM)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: growtrack-backend
    restart: always
    env_file: ./backend/.env
    depends_on:
      - db
    networks:
      - growtrack-network

  # 3. Frontend React (Nginx) - Port 80 pour Azure
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: growtrack-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
      - ai-system
    networks:
      - growtrack-network

  # 4. Système IA (Python + Gemini)
  ai-system:
    build:
      context: "./Ai System"
      dockerfile: Dockerfile
    container_name: growtrack-ai
    restart: always
    #env_file: "./Ai System/.env"
    networks:
      - growtrack-network

networks:
  growtrack-network:
    driver: bridge

volumes:
  postgres_data: