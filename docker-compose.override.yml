
# ==========================================
# DEVELOPMENT OVERRIDES
# Active by default when running `docker-compose up`
# ==========================================

services:
  nginx:
    restart: unless-stopped
    ports:
      - "8080:80"   # The central gateway exposed to Port 8080 for dev
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro

  db:
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-ScrumFlow}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-12345}

  backend:
    restart: unless-stopped
    command: php artisan serve --host=0.0.0.0 --port=8000
    ports:
      - "8000:8000"
    env_file: 
      - ./backend/.env
    environment:
      - DB_HOST=db
    volumes:
      - ./backend:/var/www

  frontend:
    build:
      target: dev
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    environment:
      - VITE_API_URL=http://localhost:8080
      - VITE_AI_SERVICE_URL=http://localhost:8080/ai
    volumes:
      - ./frontend:/app
      - /app/node_modules

  ai-system:
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - ./Ai System/.env
    volumes:
      - "./Ai System:/app"
