name: Deploy TaskFlow to Azure

on:
  push:
    branches: [ "dev" ] # Le déploiement se lance quand tu valides ton travail sur dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # Build et Push des 3 images avec les bons contextes
      - name: Build and push Backend
        run: |
          docker build -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/tf-backend:latest ./backend
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/tf-backend:latest

      - name: Build and push Frontend
        run: |
          docker build -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/tf-frontend:latest ./frontend
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/tf-frontend:latest

      - name: Build and push AI System
        run: |
          # Utilisation des guillemets pour gérer l'espace dans "Ai System"
          docker build -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/tf-ai:latest "./Ai System"
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/tf-ai:latest

      # Déploiement sur Azure Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }} # Utilise le secret configuré sur GitHub
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          configuration-file: docker-compose.yml